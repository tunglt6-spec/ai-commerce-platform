name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: commerce
          POSTGRES_PASSWORD: commerce
          POSTGRES_DB: ai_commerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U commerce -d ai_commerce"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://commerce:commerce@localhost:5432/ai_commerce?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_min16_chars_xxxxx
      JWT_REFRESH_SECRET: ci_refresh_secret_min16_chars_xxxx
      INTEGRATION_ENC_KEY: ci_integration_key_ci_integration_key_32
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm --workspace backend run db:generate

      - name: Apply migrations
        run: npm --workspace backend run db:migrate

      - name: Lint (backend)
        run: npm --workspace backend run lint

      - name: Build (backend)
        run: npm --workspace backend run build

      - name: Unit tests
        run: npm --workspace backend run test

      - name: E2E tests
        run: npm --workspace backend run test:e2e

      - name: Build (frontend)
        run: npm --workspace frontend run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api/v1

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t ai-commerce-backend:ci .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:3001/api/v1 -t ai-commerce-frontend:ci .
