name: Deploy

# Pipeline: test -> build+push images to GHCR -> SSH deploy (VPS only pulls).
# Building on GitHub runners (ample RAM) removes the small-VPS OOM/timeout that
# occurred when the VPS compiled images itself.
#
# Repo secrets (Settings -> Secrets and variables -> Actions):
#   VPS_HOST, VPS_USER, VPS_PASSWORD, VPS_PORT (opt), DEPLOY_PATH (opt)
# GHCR auth uses the built-in GITHUB_TOKEN (no extra secret needed).
# One-time on the VPS: `docker login ghcr.io` is done by the deploy step below.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: commerce
          POSTGRES_PASSWORD: commerce
          POSTGRES_DB: ai_commerce
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U commerce -d ai_commerce"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://commerce:commerce@localhost:5432/ai_commerce?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_min16_chars_xxxxx
      JWT_REFRESH_SECRET: ci_refresh_secret_min16_chars_xxxx
      INTEGRATION_ENC_KEY: ci_integration_key_ci_integration_key_32
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --workspace backend run db:generate
      - run: npm --workspace backend run db:migrate
      - run: npm --workspace backend run lint
      - run: npm --workspace backend run build
      - run: npm --workspace backend run test
      - run: npm --workspace backend run test:e2e
      - run: npm --workspace frontend run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api/v1

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/ai-commerce-backend:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/ai-commerce-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://store.picklefund.uk/api/v1
          tags: |
            ${{ env.IMAGE_BASE }}/ai-commerce-web:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/ai-commerce-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS over SSH (pull prebuilt images)
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 15m
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            # Images are PUBLIC on GHCR -> pull anonymously. Do NOT `docker login`:
            # a stored/expired credential makes GHCR permission-check and DENY the
            # pull, whereas anonymous pull of a public package succeeds. Clear any
            # stale credential first.
            docker logout ghcr.io >/dev/null 2>&1 || true
            cd "${{ secrets.DEPLOY_PATH || '/opt/ai-commerce' }}"
            git fetch origin
            git reset --hard origin/main
            export IMAGE_TAG="$IMAGE_TAG"
            bash deploy/vps-deploy.sh
