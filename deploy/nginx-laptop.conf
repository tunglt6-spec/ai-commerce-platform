# AI Commerce — router nội bộ khi chạy trên LAPTOP (sau Cloudflare Tunnel).
# KHÔNG TLS ở đây: Cloudflare edge đã terminate TLS, cloudflared nối tới nginx:80.
# Giữ nguyên logic routing của nginx-commerce.conf (/api, /uploads, /, websocket).
#
# Dùng Docker embedded DNS (127.0.0.11) + biến trong proxy_pass để resolve upstream
# theo từng request → nginx vẫn start/reload dù api/web tạm sập, không kẹt 502 IP cũ.

server {
  listen 80;
  server_name _;

  client_max_body_size 100m;

  # Docker embedded DNS; re-resolve upstream mỗi 10s.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Backend API (backend serve /api/v1/...).
  location /api/ {
    set $aic_api ai-commerce-api;
    proxy_pass http://$aic_api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;   # Cloudflare luôn là https ở edge
    proxy_read_timeout 60s;
  }

  # Media upload (backend serve /uploads/<file>).
  location /uploads/ {
    set $aic_api_u ai-commerce-api;
    proxy_pass http://$aic_api_u:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
  }

  # Next.js frontend.
  location / {
    set $aic_web ai-commerce-web;
    proxy_pass http://$aic_web:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
