# AI Commerce Platform — DEDICATED VPS (standalone), PULLS prebuilt images from GHCR.
# Combines compose.prod.yml (Caddy TLS, own reverse proxy) with compose.vps.yml
# (no on-VPS build — pull GHCR images to avoid small-VPS OOM). Use for the migration
# to a dedicated VPS. See docs/deploy/MIGRATE-TO-NEW-VPS.md.
#
#   cd /opt/ai-commerce
#   export IMAGE_TAG=latest   # or a specific commit SHA
#   docker compose --env-file deploy/.env.prod -f deploy/compose.newvps.yml pull
#   docker compose --env-file deploy/.env.prod -f deploy/compose.newvps.yml up -d
#
# TLS: default is Caddy auto-HTTPS (Let's Encrypt) via deploy/Caddyfile — works when the
# domain's DNS points here and 80/443 are reachable. Behind Cloudflare (proxied), either
# set SSL mode to Full(strict) and let Caddy issue LE, OR mount the Cloudflare Origin cert
# and switch the Caddyfile to `tls /etc/caddy/origin.crt /etc/caddy/origin.key`.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: commerce_postgres
    restart: always
    mem_limit: 1g
    mem_reservation: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  backend:
    image: ghcr.io/tunglt6-spec/ai-commerce-backend:${IMAGE_TAG:-latest}
    container_name: commerce_backend
    restart: always
    mem_limit: 1g
    mem_reservation: 256m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      BACKEND_PORT: 3001
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      CORS_ORIGINS: https://${DOMAIN}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-120}
      INTEGRATION_ENC_KEY: ${INTEGRATION_ENC_KEY}
      UPLOAD_DIR: /app/backend/uploads
      AI_GATEWAY_BASE_URL: ${AI_GATEWAY_BASE_URL:-}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      AI_MODEL_DEFAULT: ${AI_MODEL_DEFAULT:-gemini-flash}
      AI_MODEL_CONTENT: ${AI_MODEL_CONTENT:-qwen-3}
      AI_MODEL_STRATEGY: ${AI_MODEL_STRATEGY:-claude-sonnet}
      SHOPEE_PARTNER_ID: ${SHOPEE_PARTNER_ID:-}
      SHOPEE_PARTNER_KEY: ${SHOPEE_PARTNER_KEY:-}
      SHOPEE_API_BASE: ${SHOPEE_API_BASE:-https://partner.shopeemobile.com}
      SHOPEE_REDIRECT_URL: ${SHOPEE_REDIRECT_URL:-https://store.picklefund.uk/api/v1/marketplace/shopee/callback}
    volumes:
      - uploads:/app/backend/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [internal]

  frontend:
    # NEXT_PUBLIC_API_BASE_URL is baked into the image at CI build time.
    image: ghcr.io/tunglt6-spec/ai-commerce-web:${IMAGE_TAG:-latest}
    container_name: commerce_frontend
    restart: always
    mem_limit: 512m
    mem_reservation: 128m
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    container_name: commerce_caddy
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [internal]

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
