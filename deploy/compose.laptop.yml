# AI Commerce — chạy trên LAPTOP, phục vụ store.picklefund.uk qua Cloudflare Tunnel.
#
# So với compose.vps.yml: thêm ai-commerce-nginx (router, KHÔNG TLS) + cloudflared,
# KHÔNG phụ thuộc picklefund-nginx, KHÔNG mở host port nào (tunnel outbound-only).
# Web image dùng lại y nguyên (NEXT_PUBLIC_API_BASE_URL đã bake = https://store.picklefund.uk).
#
# Chạy từ repo root (laptop, Docker Desktop / WSL2):
#   docker compose --env-file deploy/.env.laptop -f deploy/compose.laptop.yml pull
#   docker compose --env-file deploy/.env.laptop -f deploy/compose.laptop.yml up -d
#
# Public hostname (Cloudflare Zero Trust → Tunnel): store.picklefund.uk → http://ai-commerce-nginx:80

services:
  ai-commerce-db:
    image: pgvector/pgvector:pg16
    container_name: ai-commerce-db
    restart: always
    mem_limit: 768m
    mem_reservation: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - aic_pgdata:/var/lib/postgresql/data
      - ../infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [commerce-net]

  ai-commerce-api:
    image: ghcr.io/tunglt6-spec/ai-commerce-backend:${IMAGE_TAG:-latest}
    container_name: ai-commerce-api
    restart: always
    mem_limit: 768m
    mem_reservation: 256m
    depends_on:
      ai-commerce-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ai-commerce-db:5432/${POSTGRES_DB}?schema=public
      BACKEND_PORT: 3001
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      CORS_ORIGINS: https://${DOMAIN}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-120}
      INTEGRATION_ENC_KEY: ${INTEGRATION_ENC_KEY}
      UPLOAD_DIR: /app/backend/uploads
      AI_GATEWAY_BASE_URL: ${AI_GATEWAY_BASE_URL:-}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      AI_MODEL_DEFAULT: ${AI_MODEL_DEFAULT:-gemini-flash}
      AI_MODEL_CONTENT: ${AI_MODEL_CONTENT:-qwen-3}
      AI_MODEL_STRATEGY: ${AI_MODEL_STRATEGY:-claude-sonnet}
      SHOPEE_PARTNER_ID: ${SHOPEE_PARTNER_ID:-}
      SHOPEE_PARTNER_KEY: ${SHOPEE_PARTNER_KEY:-}
      SHOPEE_API_BASE: ${SHOPEE_API_BASE:-https://partner.shopeemobile.com}
      SHOPEE_REDIRECT_URL: ${SHOPEE_REDIRECT_URL:-https://store.picklefund.uk/api/v1/marketplace/shopee/callback}
    volumes:
      - aic_uploads:/app/backend/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [commerce-net]

  ai-commerce-web:
    # NEXT_PUBLIC_API_BASE_URL baked ở CI (build job) = https://store.picklefund.uk → dùng lại y nguyên.
    image: ghcr.io/tunglt6-spec/ai-commerce-web:${IMAGE_TAG:-latest}
    container_name: ai-commerce-web
    restart: always
    mem_limit: 512m
    mem_reservation: 128m
    depends_on:
      - ai-commerce-api
    environment:
      NODE_ENV: production
    networks: [commerce-net]

  # Router nội bộ (thay vai trò picklefund-nginx trên VPS). KHÔNG TLS, KHÔNG host port.
  ai-commerce-nginx:
    image: nginx:1.27-alpine
    container_name: ai-commerce-nginx
    restart: always
    depends_on:
      - ai-commerce-api
      - ai-commerce-web
    volumes:
      - ./nginx-laptop.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [commerce-net]

  # Cloudflare Tunnel (managed từ dashboard). Outbound-only → không mở port router.
  # TUNNEL_TOKEN lấy ở Zero Trust → Networks → Tunnels; để trong deploy/.env.laptop (chmod 600), KHÔNG commit.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ai-commerce-cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    depends_on:
      - ai-commerce-nginx
    networks: [commerce-net]

volumes:
  aic_pgdata:
  aic_uploads:

networks:
  commerce-net:
    name: commerce-net
    driver: bridge
