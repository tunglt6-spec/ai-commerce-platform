# AI Commerce vhost — drop into the existing picklefund-nginx conf.d.
# Host path: /opt/picklefund/nginx/conf.d/commerce.conf
# Requires picklefund-nginx to be connected to the "commerce-net" network.
# Reuses the existing wildcard Cloudflare Origin cert (*.picklefund.uk).
#
# Uses the Docker embedded DNS resolver (127.0.0.11) + variables in proxy_pass so
# upstreams are resolved PER REQUEST. This means:
#   - nginx starts/reloads even if AI Commerce is temporarily down (protects PickleFund),
#   - container IP changes never cause stale-upstream 502s.
# Upstream names are unique (ai-commerce-api / ai-commerce-web) to avoid any
# collision with PickleFund's backend/frontend services.

server {
  listen 80;
  server_name store.picklefund.uk;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name store.picklefund.uk;

  ssl_certificate /etc/nginx/ssl/picklefund.crt;
  ssl_certificate_key /etc/nginx/ssl/picklefund.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  client_max_body_size 100m;

  # Docker embedded DNS; re-resolve upstreams every 10s.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Backend API (path preserved: backend serves /api/v1/...).
  location /api/ {
    set $aic_api ai-commerce-api;
    proxy_pass http://$aic_api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Uploaded media (served by backend at /uploads/<file>).
  location /uploads/ {
    set $aic_api_u ai-commerce-api;
    proxy_pass http://$aic_api_u:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Next.js frontend.
  location / {
    set $aic_web ai-commerce-web;
    proxy_pass http://$aic_web:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
