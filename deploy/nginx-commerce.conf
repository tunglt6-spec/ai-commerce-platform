# AI Commerce vhost — drop into the existing picklefund-nginx conf.d.
# Host path: /opt/picklefund/nginx/conf.d/commerce.conf
# Requires picklefund-nginx to be connected to the "commerce-net" network so
# these upstream names resolve:  docker network connect commerce-net picklefund-nginx
# Reuses the existing wildcard Cloudflare Origin cert (*.picklefund.uk).

upstream ai_commerce_web { server ai-commerce-web:3000; }
upstream ai_commerce_api { server ai-commerce-api:3001; }

server {
  listen 80;
  server_name store.picklefund.uk;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name store.picklefund.uk;

  ssl_certificate /etc/nginx/ssl/picklefund.crt;
  ssl_certificate_key /etc/nginx/ssl/picklefund.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # Allow media uploads up to 100MB (matches backend limit).
  client_max_body_size 100m;

  # Backend API (path preserved: backend serves /api/v1/...).
  location /api/ {
    proxy_pass http://ai_commerce_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Uploaded media (served by backend at /uploads/<file>).
  location /uploads/ {
    proxy_pass http://ai_commerce_api;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Next.js frontend.
  location / {
    proxy_pass http://ai_commerce_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
